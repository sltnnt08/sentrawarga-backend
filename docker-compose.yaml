services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: sentrawarga
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    container_name: sentrawarga-backend
    image: sentrawarga-backend
    build: .
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:root@db:5432/sentrawarga
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "npm run migrate:deploy && node ./src/server.js"
volumes:
  pgdata:
