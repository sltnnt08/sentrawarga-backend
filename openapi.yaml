openapi: 3.1.0
info:
  title: SentraWarga Backend API
  version: 1.0.0
servers:
  - url: http://localhost:3000
paths:
  /healthz:
    get:
      summary: Liveness check
      responses:
        '200':
          description: Service alive
  /readyz:
    get:
      summary: Readiness check with database
      responses:
        '200':
          description: Service ready
        '500':
          description: Service not ready
  /api/auth/register:
    post:
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                address:
                  type: string
      responses:
        '201':
          description: Registered
  /api/auth/login:
    post:
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Logged in
  /api/auth/me:
    get:
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user
  /api/reports:
    get:
      summary: List reports
      responses:
        '200':
          description: Report list
    post:
      summary: Create report
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Report created
  /api/reports/{id}:
    get:
      summary: Get report detail
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Report detail
        '404':
          description: Report not found
  /api/reports/{id}/status:
    patch:
      summary: Update report status (admin only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Status updated
        '403':
          description: Forbidden
  /api/reports/{reportId}/comments:
    get:
      summary: List comments by report
      parameters:
        - in: path
          name: reportId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Comments listed
    post:
      summary: Create comment
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: reportId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '201':
          description: Comment created
  /api/reports/{reportId}/votes:
    get:
      summary: Get vote summary
      parameters:
        - in: path
          name: reportId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Vote summary
    post:
      summary: Set vote
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: reportId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Vote saved
    delete:
      summary: Remove vote
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: reportId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Vote removed or no vote
  /api/notifications:
    get:
      summary: List notifications
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Notifications listed
  /api/notifications/read-all:
    patch:
      summary: Mark all notifications as read
      security:
        - bearerAuth: []
      responses:
        '200':
          description: All notifications marked read
  /api/notifications/{id}/read:
    patch:
      summary: Mark one notification as read
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Notification marked read
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
