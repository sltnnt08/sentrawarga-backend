openapi: 3.1.0
info:
  title: SentraWarga Backend API
  version: 1.0.0
  description: API documentation synced with current Express routes and validators.
servers:
  - url: http://localhost:3000
tags:
  - name: Health
  - name: Auth
  - name: Reports
  - name: Comments
  - name: Votes
  - name: Notifications
paths:
  /:
    get:
      tags: [Health]
      summary: API root endpoint
      responses:
        '200':
          description: API status message
          content:
            application/json:
              schema:
                type: object
                required: [success, message]
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: API running

  /healthz:
    get:
      tags: [Health]
      summary: Liveness check
      responses:
        '200':
          description: Service alive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /readyz:
    get:
      tags: [Health]
      summary: Readiness check with database
      responses:
        '200':
          description: Service ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/reports:
    get:
      tags: [Reports]
      summary: List reports
      parameters:
        - $ref: '#/components/parameters/ReportStatusQuery'
        - $ref: '#/components/parameters/PriorityQuery'
        - $ref: '#/components/parameters/CategoryQuery'
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Report list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportListResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Reports]
      summary: Create report
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReportRequest'
      responses:
        '201':
          description: Report created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportCreateResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/reports/{id}:
    get:
      tags: [Reports]
      summary: Get report detail
      parameters:
        - $ref: '#/components/parameters/ReportId'
      responses:
        '200':
          description: Report detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportDetailResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/reports/{id}/status:
    patch:
      tags: [Reports]
      summary: Update report status (admin only)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ReportId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReportStatusRequest'
      responses:
        '200':
          description: Status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportStatusUpdateResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/reports/{reportId}/comments:
    get:
      tags: [Comments]
      summary: List comments by report
      parameters:
        - $ref: '#/components/parameters/ReportIdAlt'
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Comments listed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentListResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Comments]
      summary: Create comment
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ReportIdAlt'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCommentRequest'
      responses:
        '201':
          description: Comment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentCreateResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/reports/{reportId}/votes:
    get:
      tags: [Votes]
      summary: Get vote summary
      description: Authentication is optional. If authenticated, currentUserVote is filled when user has voted.
      parameters:
        - $ref: '#/components/parameters/ReportIdAlt'
      responses:
        '200':
          description: Vote summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VoteSummaryResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Votes]
      summary: Set vote
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ReportIdAlt'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetVoteRequest'
      responses:
        '200':
          description: Vote saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetVoteResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags: [Votes]
      summary: Remove vote
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ReportIdAlt'
      responses:
        '200':
          description: Vote removed or no vote
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RemoveVoteResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/notifications:
    get:
      tags: [Notifications]
      summary: List notifications
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/UnreadOnlyQuery'
      responses:
        '200':
          description: Notifications listed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationListResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/notifications/read-all:
    patch:
      tags: [Notifications]
      summary: Mark all notifications as read
      security:
        - bearerAuth: []
      responses:
        '200':
          description: All notifications marked read
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarkAllNotificationsReadResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/notifications/{id}/read:
    patch:
      tags: [Notifications]
      summary: Mark one notification as read
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/NotificationId'
      responses:
        '200':
          description: Notification marked read
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarkNotificationReadResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ReportId:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
    ReportIdAlt:
      in: path
      name: reportId
      required: true
      schema:
        type: string
        format: uuid
    NotificationId:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
    PageQuery:
      in: query
      name: page
      required: false
      schema:
        type: integer
        minimum: 1
      example: 1
    LimitQuery:
      in: query
      name: limit
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 50
      example: 10
    UnreadOnlyQuery:
      in: query
      name: unreadOnly
      required: false
      schema:
        type: boolean
      description: Supports true or false.
    ReportStatusQuery:
      in: query
      name: status
      required: false
      schema:
        $ref: '#/components/schemas/ReportStatus'
    PriorityQuery:
      in: query
      name: priority
      required: false
      schema:
        $ref: '#/components/schemas/Priority'
    CategoryQuery:
      in: query
      name: category
      required: false
      schema:
        $ref: '#/components/schemas/Category'

  responses:
    ValidationError:
      description: Input validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
    UnauthorizedError:
      description: Missing or invalid authentication
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            message: Unauthorized
            requestId: req_123
    ForbiddenError:
      description: Insufficient role/permission
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            message: Forbidden
            requestId: req_123
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ConflictError:
      description: Resource conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            message: Email already registered
            requestId: req_123
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            message: Internal server error
            requestId: req_123

  schemas:
    Role:
      type: string
      enum: [USER, ADMIN]
    Priority:
      type: string
      enum: [LOW, NORMAL, HIGH, CRITICAL]
    Category:
      type: string
      enum:
        [
          CRIMINAL,
          TRASH,
          FLOOD,
          POLLUTION,
          ROADS_ISSUE,
          PUBLIC_DISTURBANCE,
          ACCIDENTS,
        ]
    ReportStatus:
      type: string
      enum: [PENDING, VERIFIED, IN_PROGRESS, RESOLVED, REJECTED]
    VoteType:
      type: string
      enum: [UP, DOWN]
    NotificationType:
      type: string
      enum: [REPORT_STATUS_CHANGED, NEW_COMMENT, REPORT_RESOLVED, ADMIN_REPLY]

    User:
      type: object
      required: [id, name, email, role, emailVerified, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 2
          maxLength: 100
        email:
          type: string
          format: email
          maxLength: 120
        address:
          type: string
          maxLength: 255
        role:
          $ref: '#/components/schemas/Role'
        emailVerified:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UserSummary:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string

    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        email:
          type: string
          format: email
          maxLength: 120
        password:
          type: string
          minLength: 8
          maxLength: 100
        address:
          type: string
          maxLength: 255

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          maxLength: 120
        password:
          type: string
          minLength: 8
          maxLength: 100

    AuthPayload:
      type: object
      required: [accessToken, user]
      properties:
        accessToken:
          type: string
        user:
          $ref: '#/components/schemas/User'

    RegisterPayload:
      type: object
      required: [user, email, emailVerificationRequired, verificationEmailSent, message]
      properties:
        user:
          $ref: '#/components/schemas/User'
        email:
          type: string
          format: email
        emailVerificationRequired:
          type: boolean
          example: true
        verificationEmailSent:
          type: boolean
          example: true
        message:
          type: string
          example: Silakan verifikasi email Anda

    AuthSuccessResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Login success
        data:
          $ref: '#/components/schemas/AuthPayload'

    RegisterSuccessResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Silakan verifikasi email Anda
        data:
          $ref: '#/components/schemas/RegisterPayload'

    Report:
      type: object
      required:
        - id
        - title
        - description
        - category
        - priority
        - status
        - reporterId
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          minLength: 3
          maxLength: 200
        description:
          type: string
          minLength: 10
          maxLength: 3000
        category:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Category'
        priority:
          $ref: '#/components/schemas/Priority'
        status:
          $ref: '#/components/schemas/ReportStatus'
        latitude:
          type: number
        longitude:
          type: number
        address:
          type: string
          maxLength: 255
        reporterId:
          type: string
          format: uuid
        resolvedAt:
          type:
            - string
            - 'null'
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ReportWithReporter:
      allOf:
        - $ref: '#/components/schemas/Report'
        - type: object
          required: [reporter]
          properties:
            reporter:
              $ref: '#/components/schemas/UserSummary'

    ReportImage:
      type: object
      required: [id, reportId, imageUrl, createdAt]
      properties:
        id:
          type: string
          format: uuid
        reportId:
          type: string
          format: uuid
        imageUrl:
          type: string
        createdAt:
          type: string
          format: date-time

    ReportCount:
      type: object
      required: [votes, comments]
      properties:
        votes:
          type: integer
        comments:
          type: integer

    ReportDetail:
      allOf:
        - $ref: '#/components/schemas/Report'
        - type: object
          required: [reporter, reportImages, _count]
          properties:
            reporter:
              type: object
              required: [id, name, email]
              properties:
                id:
                  type: string
                  format: uuid
                name:
                  type: string
                email:
                  type: string
                  format: email
            reportImages:
              type: array
              items:
                $ref: '#/components/schemas/ReportImage'
            _count:
              $ref: '#/components/schemas/ReportCount'

    Pagination:
      type: object
      required: [total, page, limit, totalPages]
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer

    CreateReportRequest:
      type: object
      required: [title, description, category, priority]
      properties:
        title:
          type: string
          minLength: 3
          maxLength: 200
        description:
          type: string
          minLength: 10
          maxLength: 3000
        category:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Category'
        priority:
          $ref: '#/components/schemas/Priority'
        latitude:
          type: number
        longitude:
          type: number
        address:
          type: string
          maxLength: 255

    UpdateReportStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          $ref: '#/components/schemas/ReportStatus'

    ReportListPayload:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ReportWithReporter'
        pagination:
          $ref: '#/components/schemas/Pagination'

    ReportListResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/ReportListPayload'

    ReportCreateResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
        message:
          type: string
          example: Report created
        data:
          allOf:
            - $ref: '#/components/schemas/Report'
            - type: object
              required: [reporter]
              properties:
                reporter:
                  type: object
                  required: [id, name, email]
                  properties:
                    id:
                      type: string
                      format: uuid
                    name:
                      type: string
                    email:
                      type: string
                      format: email

    ReportDetailResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/ReportDetail'

    ReportStatusUpdateResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
        message:
          type: string
          example: Report status updated
        data:
          allOf:
            - $ref: '#/components/schemas/Report'
            - type: object
              required: [reporter]
              properties:
                reporter:
                  type: object
                  required: [id, name, email]
                  properties:
                    id:
                      type: string
                      format: uuid
                    name:
                      type: string
                    email:
                      type: string
                      format: email

    Comment:
      type: object
      required: [id, content, reportId, userId, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        content:
          type: string
          minLength: 1
          maxLength: 2000
        reportId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CommentWithUser:
      allOf:
        - $ref: '#/components/schemas/Comment'
        - type: object
          required: [user]
          properties:
            user:
              $ref: '#/components/schemas/UserSummary'

    CreateCommentRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 2000

    CommentListPayload:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CommentWithUser'
        pagination:
          $ref: '#/components/schemas/Pagination'

    CommentListResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/CommentListPayload'

    CommentCreateResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
        message:
          type: string
          example: Comment created
        data:
          allOf:
            - $ref: '#/components/schemas/Comment'
            - type: object
              required: [user]
              properties:
                user:
                  type: object
                  required: [id, name, email]
                  properties:
                    id:
                      type: string
                      format: uuid
                    name:
                      type: string
                    email:
                      type: string
                      format: email

    Vote:
      type: object
      required: [id, userId, reportId, type, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        reportId:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/VoteType'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SetVoteRequest:
      type: object
      required: [type]
      properties:
        type:
          $ref: '#/components/schemas/VoteType'

    VoteSummaryPayload:
      type: object
      required: [upVotes, downVotes, currentUserVote]
      properties:
        upVotes:
          type: integer
        downVotes:
          type: integer
        currentUserVote:
          type:
            - string
            - 'null'
          enum: [UP, DOWN, null]

    VoteSummaryResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/VoteSummaryPayload'

    SetVoteResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
        message:
          type: string
          example: Vote saved
        data:
          $ref: '#/components/schemas/Vote'

    RemoveVotePayload:
      type: object
      required: [deleted]
      properties:
        deleted:
          type: boolean

    RemoveVoteResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
        message:
          type: string
          example: Vote removed
        data:
          $ref: '#/components/schemas/RemoveVotePayload'

    Notification:
      type: object
      required: [id, userId, title, message, type, isRead, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        title:
          type: string
        message:
          type: string
        type:
          $ref: '#/components/schemas/NotificationType'
        relatedId:
          type:
            - string
            - 'null'
          format: uuid
        isRead:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    NotificationListPayload:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Notification'
        pagination:
          $ref: '#/components/schemas/Pagination'

    NotificationListResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/NotificationListPayload'

    MarkAllNotificationsReadPayload:
      type: object
      required: [updatedCount]
      properties:
        updatedCount:
          type: integer

    MarkAllNotificationsReadResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
        message:
          type: string
          example: All notifications marked as read
        data:
          $ref: '#/components/schemas/MarkAllNotificationsReadPayload'

    MarkNotificationReadResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
        message:
          type: string
          example: Notification marked as read
        data:
          $ref: '#/components/schemas/Notification'

    HealthResponse:
      type: object
      required: [success, status, service, timestamp]
      properties:
        success:
          type: boolean
          example: true
        status:
          type: string
          example: ok
        service:
          type: string
          example: sentrawarga-backend
        timestamp:
          type: string
          format: date-time

    ReadyResponse:
      type: object
      required: [success, status, timestamp]
      properties:
        success:
          type: boolean
          example: true
        status:
          type: string
          example: ready
        timestamp:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      required: [success, message, requestId]
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        requestId:
          type: string
        details:
          type: object

    ValidationErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          properties:
            details:
              type: object
              properties:
                errors:
                  type: array
                  items:
                    type: object
                    required: [path, message]
                    properties:
                      path:
                        type: string
                      message:
                        type: string
